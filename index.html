<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hard-Coded Data Virtualizer</title>
    <style>
        :root { --card-w: 80vw; --gap: 20px; }
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }

        /* MONITOR HUD */
        #hud {
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: #222; border: 1px solid #444; padding: 10px;
            font-family: monospace; font-size: 12px; border-radius: 8px;
        }
        .highlight { color: #0f0; }

        #carousel {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            height: 100vh; align-items: center; padding: 0 10vw;
            gap: var(--gap); scrollbar-width: none;
        }
        #carousel::-webkit-scrollbar { display: none; }

        .shell {
            flex: 0 0 var(--card-w); 
            height: 70vh; 
            background: #111; 
            border: 1px solid #333;
            border-radius: 30px; 
            scroll-snap-align: center;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .shell img { width: 100%; height: 100%; object-fit: cover; }
        .landscape-img { object-fit: contain !important; background: #000; }
    </style>
</head>
<body>

    <div id="hud">
        DOM NODES: <span id="node-count" class="highlight">0</span><br>
        ACTIVE IMGS: <span id="img-count" class="highlight">0</span>
    </div>

    <div id="carousel"></div>

    <script src="data.js"></script>

    <script>
        const container = document.getElementById('carousel');
        const nodeDisplay = document.getElementById('node-count');
        const imgDisplay = document.getElementById('img-count');

        // THE OBSERVER: This is the "Hard Disable" engine
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const shell = entry.target;
                const postData = JSON.parse(shell.dataset.post);

                if (entry.isIntersecting) {
                    // PULL FROM DATA AND INJECT
                    const imgClass = postData.type === 'landscape' ? 'landscape-img' : '';
                    shell.innerHTML = `
                        <a href="${postData.href}">
                            <img src="${postData.img}" class="${imgClass}" alt="Post ${postData.id}">
                        </a>`;
                } else {
                    // TOTALLY ERASE FROM DOM
                    shell.innerHTML = '';
                }
            });
        }, { threshold: 0.1 });

        // INITIALIZE FROM DATA.JS
        function init() {
            if (typeof myPosts === 'undefined') {
                console.error("data.js not loaded!");
                return;
            }

            myPosts.forEach(post => {
                const shell = document.createElement('div');
                shell.className = 'shell';
                
                // We stringify the specific post data into the shell's memory
                shell.dataset.post = JSON.stringify(post);
                
                container.appendChild(shell);
                observer.observe(shell);
            });
        }

        // HUD MONITORING SCRIPT
        setInterval(() => {
            nodeDisplay.innerText = document.querySelectorAll('#carousel *').length;
            imgDisplay.innerText = document.querySelectorAll('img').length;
        }, 100);

        init();
    </script>
</body>
</html>
